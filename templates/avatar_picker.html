<div id="avatar-picker" class="avatar-picker">
  <!-- Current Avatar Preview -->
  <div class="avatar-preview-section">
    <div class="avatar-preview-container">
      <img 
        id="avatar-preview" 
        src="https://api.dicebear.com/7.x/adventurer/svg?seed=default" 
        alt="Your avatar"
        class="avatar-preview-image"
      />
    </div>
    <button type="button" id="randomize-btn" class="btn-secondary">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      Randomize
    </button>
  </div>

  <!-- Style Selection -->
  <div class="style-section">
    <label class="section-label">Choose a style</label>
    <div id="style-grid" class="style-grid">
      <!-- Styles will be populated by JavaScript -->
    </div>
  </div>

  <!-- Hidden inputs for form submission -->
  <input type="hidden" id="avatar-seed" name="avatar_seed" value="" />
  <input type="hidden" id="avatar-style" name="avatar_style" value="adventurer" />
  <input type="hidden" id="avatar-url" name="avatar_url" value="" />
</div>

<style>
  .avatar-picker {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    padding: 1rem;
  }

  .avatar-preview-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .avatar-preview-container {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    background-color: #f3f4f6;
    border: 3px solid #e5e7eb;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }

  .avatar-preview-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: #374151;
    background-color: #fff;
    border: 1px solid #d1d5db;
    border-radius: 0.5rem;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-secondary:hover {
    background-color: #f9fafb;
    border-color: #9ca3af;
  }

  .section-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: #374151;
    margin-bottom: 0.75rem;
  }

  .style-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
    max-height: 280px;
    overflow-y: auto;
    padding: 0.25rem;
  }

  @media (max-width: 640px) {
    .style-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .style-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    padding: 0.5rem;
    border: 2px solid transparent;
    border-radius: 0.75rem;
    cursor: pointer;
    transition: all 0.15s ease;
    background-color: #f9fafb;
  }

  .style-option:hover {
    background-color: #f3f4f6;
    border-color: #d1d5db;
  }

  .style-option.selected {
    border-color: #3b82f6;
    background-color: #eff6ff;
  }

  .style-option img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background-color: #fff;
  }

  .style-option span {
    font-size: 0.625rem;
    color: #6b7280;
    text-align: center;
    max-width: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>

<script>
  (function() {
    // Popular styles shown first
    const popularStyles = [
      'adventurer', 'avataaars', 'big-ears', 'big-smile', 
      'bottts', 'fun-emoji', 'lorelei', 'micah',
      'notionists', 'open-peeps', 'personas', 'pixel-art'
    ];
    
    // All available styles
    const allStyles = [
      'adventurer', 'adventurer-neutral', 'avataaars', 'avataaars-neutral',
      'big-ears', 'big-ears-neutral', 'big-smile', 'bottts', 'bottts-neutral',
      'croodles', 'croodles-neutral', 'dylan', 'fun-emoji', 'glass', 'icons',
      'identicon', 'initials', 'lorelei', 'lorelei-neutral', 'micah', 'miniavs',
      'notionists', 'notionists-neutral', 'open-peeps', 'personas', 'pixel-art',
      'pixel-art-neutral', 'rings', 'shapes', 'thumbs'
    ];

    // Sort: popular first, then rest alphabetically
    const sortedStyles = [
      ...popularStyles,
      ...allStyles.filter(s => !popularStyles.includes(s)).sort()
    ];

    let currentSeed = generateSeed();
    let currentStyle = 'adventurer';

    function generateSeed(length = 12) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let result = '';
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    function getAvatarUrl(seed, style) {
      return `https://api.dicebear.com/7.x/${style}/svg?seed=${seed}`;
    }

    function updatePreview() {
      const url = getAvatarUrl(currentSeed, currentStyle);
      document.getElementById('avatar-preview').src = url;
      document.getElementById('avatar-seed').value = currentSeed;
      document.getElementById('avatar-style').value = currentStyle;
      document.getElementById('avatar-url').value = url;
    }

    function renderStyleGrid() {
      const grid = document.getElementById('style-grid');
      grid.innerHTML = '';

      sortedStyles.forEach(style => {
        const option = document.createElement('div');
        option.className = 'style-option' + (style === currentStyle ? ' selected' : '');
        option.innerHTML = `
          <img src="${getAvatarUrl(currentSeed, style)}" alt="${style}" />
          <span>${style}</span>
        `;
        option.addEventListener('click', () => {
          currentStyle = style;
          document.querySelectorAll('.style-option').forEach(el => el.classList.remove('selected'));
          option.classList.add('selected');
          updatePreview();
        });
        grid.appendChild(option);
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderStyleGrid();
      updatePreview();

      // Randomize button
      document.getElementById('randomize-btn').addEventListener('click', () => {
        currentSeed = generateSeed();
        renderStyleGrid(); // Re-render to update style previews with new seed
        updatePreview();
      });
    });
  })();
</script>
