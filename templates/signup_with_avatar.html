<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Create Your Avatar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .signup-container {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .signup-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 2rem;
      text-align: center;
    }

    .signup-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .signup-header p {
      opacity: 0.9;
      font-size: 0.875rem;
    }

    .signup-form {
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .avatar-section {
      background: #f9fafb;
      border-radius: 0.75rem;
      margin-bottom: 1.5rem;
      border: 1px solid #e5e7eb;
    }

    .avatar-section-header {
      padding: 1rem;
      border-bottom: 1px solid #e5e7eb;
    }

    .avatar-section-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #111827;
    }

    .avatar-section-header p {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    .btn-primary {
      width: 100%;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #6b7280;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    /* Avatar Picker Styles (embedded) */
    .avatar-picker {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
    }

    .avatar-preview-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .avatar-preview-container {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      background-color: #fff;
      border: 3px solid #667eea;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .avatar-preview-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      background-color: #fff;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-secondary:hover {
      background-color: #f9fafb;
      border-color: #667eea;
    }

    .section-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
      padding: 0.25rem;
    }

    .style-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.125rem;
      padding: 0.375rem;
      border: 2px solid transparent;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.15s ease;
      background-color: #fff;
    }

    .style-option:hover {
      border-color: #d1d5db;
    }

    .style-option.selected {
      border-color: #667eea;
      background-color: #f0f5ff;
    }

    .style-option img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #f3f4f6;
    }

    .style-option span {
      font-size: 0.5rem;
      color: #6b7280;
      text-align: center;
      max-width: 50px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-header">
      <h1>Create Your Account</h1>
      <p>Join us and customize your avatar</p>
    </div>

    <form class="signup-form" action="/api/signup" method="POST">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          class="form-input" 
          placeholder="Choose a username"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-input" 
          placeholder="your@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-input" 
          placeholder="Create a password"
          required
        />
      </div>

      <!-- Avatar Selection Section -->
      <div class="avatar-section">
        <div class="avatar-section-header">
          <h2>Choose Your Avatar</h2>
          <p>This will represent you on the map and in chats</p>
        </div>
        
        <div class="avatar-picker">
          <div class="avatar-preview-section">
            <div class="avatar-preview-container">
              <img 
                id="avatar-preview" 
                src="https://api.dicebear.com/7.x/adventurer/svg?seed=default" 
                alt="Your avatar"
                class="avatar-preview-image"
              />
            </div>
            <button type="button" id="randomize-btn" class="btn-secondary">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                <path d="M8 16H3v5"/>
              </svg>
              Randomize
            </button>
          </div>

          <div class="style-section">
            <label class="section-label">Style</label>
            <div id="style-grid" class="style-grid"></div>
          </div>

          <!-- Hidden fields for form submission -->
          <input type="hidden" id="avatar-seed" name="avatar_seed" value="" />
          <input type="hidden" id="avatar-style" name="avatar_style" value="adventurer" />
          <input type="hidden" id="avatar-url" name="avatar_url" value="" />
        </div>
      </div>

      <button type="submit" class="btn-primary">Create Account</button>

      <p class="login-link">
        Already have an account? <a href="/login">Log in</a>
      </p>
    </form>
  </div>

  <script>
    (function() {
      const popularStyles = [
        'adventurer', 'avataaars', 'big-ears', 'big-smile', 
        'bottts', 'fun-emoji', 'lorelei', 'micah',
        'notionists', 'open-peeps', 'personas', 'pixel-art'
      ];

      let currentSeed = generateSeed();
      let currentStyle = 'adventurer';

      function generateSeed(length = 12) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
          result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
      }

      function getAvatarUrl(seed, style) {
        return `https://api.dicebear.com/7.x/${style}/svg?seed=${seed}`;
      }

      function updatePreview() {
        const url = getAvatarUrl(currentSeed, currentStyle);
        document.getElementById('avatar-preview').src = url;
        document.getElementById('avatar-seed').value = currentSeed;
        document.getElementById('avatar-style').value = currentStyle;
        document.getElementById('avatar-url').value = url;
      }

      function renderStyleGrid() {
        const grid = document.getElementById('style-grid');
        grid.innerHTML = '';

        popularStyles.forEach(style => {
          const option = document.createElement('div');
          option.className = 'style-option' + (style === currentStyle ? ' selected' : '');
          option.innerHTML = `
            <img src="${getAvatarUrl(currentSeed, style)}" alt="${style}" />
            <span>${style}</span>
          `;
          option.addEventListener('click', () => {
            currentStyle = style;
            document.querySelectorAll('.style-option').forEach(el => el.classList.remove('selected'));
            option.classList.add('selected');
            updatePreview();
          });
          grid.appendChild(option);
        });
      }

      document.addEventListener('DOMContentLoaded', () => {
        renderStyleGrid();
        updatePreview();

        document.getElementById('randomize-btn').addEventListener('click', () => {
          currentSeed = generateSeed();
          renderStyleGrid();
          updatePreview();
        });
      });
    })();
  </script>
</body>
</html>
